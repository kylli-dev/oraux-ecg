# Development overrides — SQLite, hot reload, no nginx
# Usage: docker compose -f docker-compose.dev.yml up
# Or simply: make dev

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./oraux_dev.db
      ADMIN_API_KEY: change-me-dev
      SECRET_KEY: dev-secret-key-not-for-production

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_ADMIN_API_KEY: change-me-dev
      ADMIN_API_KEY: change-me-dev
