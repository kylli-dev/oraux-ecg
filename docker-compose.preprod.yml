# Pre-production overrides — PostgreSQL + debug logs
# Usage: docker compose --env-file .env.preprod -f docker-compose.yml -f docker-compose.preprod.yml up -d

services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level debug
    environment:
      ENVIRONMENT: preprod

  frontend:
    environment:
      NODE_ENV: production

  nginx:
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
